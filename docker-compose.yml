version: '3.8'

services:
  mongodb:
    image: mongo:6
    container_name: train-track-mongodb
    restart: always
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password
    volumes:
      - mongodb_data:/data/db

  backend:
    build: .
    container_name: train-track-backend
    restart: always
    ports:
      - "8000:8000"
    environment:
      MONGODB_URL: mongodb://admin:password@mongodb:27017
      DATABASE_NAME: train_track_db
      SECRET_KEY: your-secret-key-change-this-in-production
    depends_on:
      - mongodb
    volumes:
      - .:/app

volumes:
  mongodb_data:
